name: Platform smoke loop

on:
  workflow_dispatch:
    inputs:
      attempts:
        description: "Maximum randomized attempts before failing"
        required: true
        default: "10"
      stream_minutes:
        description: "Smoke stream duration in minutes"
        required: true
        default: "10"

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: platform-smoke-loop
  cancel-in-progress: false

jobs:
  smoke-loop:
    runs-on: ubuntu-latest
    timeout-minutes: 210
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Run randomized platform smoke loop
        id: smoke
        continue-on-error: true
        run: |
          set -o pipefail
          npm run verify:platform-smoke 2>&1 | tee platform-smoke-loop.log
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PLATFORM_SMOKE_REF: ${{ github.ref_name }}
          PLATFORM_SMOKE_ATTEMPTS: ${{ inputs.attempts || '10' }}
          PLATFORM_SMOKE_STREAM_MINUTES: ${{ inputs.stream_minutes || '10' }}
          PLATFORM_SMOKE_START_DELAY_MINUTES: "2"
          PLATFORM_SMOKE_WORKFLOW_TIMEOUT_MINUTES: "150"
          PLATFORM_SMOKE_FINAL_VERIFY_TIMEOUT_SECONDS: "300"
          PLATFORM_SMOKE_MAX_CARDS: "3"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_EXPECT_PRIVACY_STATUS: public
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Report unresolved platform smoke failure
        if: ${{ steps.smoke.outcome == 'failure' }}
        run: |
          {
            echo "ConferenceHype platform smoke loop failed."
            echo ""
            echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Selected conference: ${{ steps.smoke.outputs.conference }}"
            echo "Selected journal: ${{ steps.smoke.outputs.journal }}"
            echo "Selected clinical news source: ${{ steps.smoke.outputs.source }}"
            echo "Scheduled start: ${{ steps.smoke.outputs.start_at }}"
            echo "Coverage slot: ${{ steps.smoke.outputs.slot_id }}"
            echo "YouTube workflow: ${{ steps.smoke.outputs.youtube_workflow_url }}"
            echo ""
            echo "Smoke loop log:"
            echo '```text'
            cat platform-smoke-loop.log
            echo '```'
          } > issue-body.md
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Platform smoke loop failed" \
            --body-file issue-body.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Fail unresolved platform smoke loop
        if: ${{ steps.smoke.outcome == 'failure' }}
        run: exit 1
