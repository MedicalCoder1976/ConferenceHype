name: YouTube video privacy

on:
  workflow_dispatch:
    inputs:
      youtube_video_id:
        description: "YouTube video ID to update"
        required: true
      privacy_status:
        description: "Desired visibility"
        required: true
        default: "public"
        type: choice
        options:
          - public
          - unlisted
          - private

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Update YouTube video privacy
        run: npx tsx scripts/update-youtube-video-privacy.ts
        env:
          YOUTUBE_VIDEO_ID: ${{ inputs.youtube_video_id }}
          YOUTUBE_PRIVACY_STATUS: ${{ inputs.privacy_status }}
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
