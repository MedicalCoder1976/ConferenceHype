name: Generate review segments

on:
  workflow_dispatch:
  # Automatic hourly Grok generation removed to control xAI spend. The free
  # weekly-source-cards.yml batch sweep (no LLM calls) covers every enabled
  # conference, journal, and newspaper. Run this workflow manually from the
  # Actions tab whenever a fresh real-AI pass is wanted mid-week.

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run job:generate
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
