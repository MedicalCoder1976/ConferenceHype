name: YouTube stream

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Maximum stream duration before GitHub stops the job"
        required: true
        default: "60"
        type: choice
        options:
          - "60"
      stream_input_path:
        description: "Video file to loop into YouTube"
        required: true
        default: "public/rendered/fallback-loop.mp4"
      stream_start_time:
        description: "ISO start time for rendering the correct rundown cards (leave blank for fallback loop)"
        required: false
        default: ""
      coverage_slot_id:
        description: "Optional conference coverage slot UUID for delivery tracking"
        required: false
        default: ""
  schedule:
    # Poll the approved admin programming plan. Rendering starts far enough
    # ahead of each one-hour slot to finish before its scheduled airtime.
    - cron: "15 * * * *"

jobs:
  stream:
    runs-on: ubuntu-latest
    # Schedule: setup + render + one-hour stream + buffer.
    # Rendering for the next hour may overlap the current live hour, so the
    # workflow must not use a job-wide concurrency lock.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # Resolve a saved conference coverage slot or an explicit dispatch time.
      - name: Resolve block start time
        id: block
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            FROM=$(date -u -d "+45 minutes" +"%Y-%m-%dT%H:%M:%SZ")
            TO=$(date -u -d "+60 minutes" +"%Y-%m-%dT%H:%M:%SZ")
            RECORD=$(curl --fail --silent --show-error \
              --get "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/conference_coverage_slots" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              --data-urlencode "select=id,starts_at,duration_hours,medical_conferences(name,acronym)" \
              --data-urlencode "enabled=eq.true" \
              --data-urlencode "approval_status=eq.approved" \
              --data-urlencode "youtube_status=eq.not_scheduled" \
              --data-urlencode "starts_at=gte.${FROM}" \
              --data-urlencode "starts_at=lt.${TO}" \
              --data-urlencode "order=starts_at.asc" \
              --data-urlencode "limit=1" | jq -c '.[0] // {}')
            SLOT_ID=$(jq -r '.id // empty' <<< "${RECORD}")
            BLOCK_START=$(jq -r '.starts_at // empty' <<< "${RECORD}")
            DURATION_HOURS=$(jq -r '.duration_hours // 1' <<< "${RECORD}")
            CONFERENCE_NAME=$(jq -r '.medical_conferences.acronym // .medical_conferences.name // "ConferenceHype"' <<< "${RECORD}")
            DURATION_SECONDS=$((DURATION_HOURS * 3600))
            if [ -z "${BLOCK_START}" ]; then
              CONTINUOUS=$(curl --fail --silent --show-error \
                --get "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/stream_state" \
                -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
                --data-urlencode "select=continuous_enabled" \
                --data-urlencode "id=eq.1" \
                --data-urlencode "limit=1" | jq -r '.[0].continuous_enabled // false')
              if [ "${CONTINUOUS}" = "true" ]; then
                BLOCK_START=$(date -u -d "+45 minutes" +"%Y-%m-%dT%H:00:00Z")
                CONFERENCE_NAME="ConferenceHype"
                DURATION_SECONDS=3600
              fi
            fi
          else
            SLOT_ID="${{ inputs.coverage_slot_id }}"
            BLOCK_START="${{ inputs.stream_start_time }}"
            CONFERENCE_NAME="ConferenceHype"
            DURATION_SECONDS=$(( ${{ inputs.duration_minutes || 60 }} * 60 ))
          fi
          if [ -z "${BLOCK_START}" ]; then
            echo "::notice::No approved programming block is ready for publishing."
          fi
          echo "slot_id=${SLOT_ID}" >> $GITHUB_OUTPUT
          echo "block_start=${BLOCK_START}" >> $GITHUB_OUTPUT
          echo "duration_seconds=${DURATION_SECONDS}" >> $GITHUB_OUTPUT
          echo "broadcast_title=ConferenceHype: ${CONFERENCE_NAME} live programming - ${BLOCK_START}" >> $GITHUB_OUTPUT
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Install Kokoro TTS dependencies
        if: ${{ steps.block.outputs.block_start != '' }}
        run: pip install kokoro numpy soundfile

      - name: Mark programming block as rendering
        if: ${{ steps.block.outputs.slot_id != '' }}
        run: npx tsx scripts/update-youtube-delivery.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COVERAGE_SLOT_ID: ${{ steps.block.outputs.slot_id }}
          YOUTUBE_DELIVERY_STATUS: rendering

      - name: Validate YouTube broadcast automation
        if: ${{ steps.block.outputs.block_start != '' }}
        run: |
          if [ -n "${YOUTUBE_OAUTH_CLIENT_ID}" ] && [ -n "${YOUTUBE_OAUTH_CLIENT_SECRET}" ] && [ -n "${YOUTUBE_OAUTH_REFRESH_TOKEN}" ]; then
            echo "YouTube OAuth configuration is present; a fresh video will be created."
          elif [ -n "${YOUTUBE_RTMP_URL}" ] && [ -n "${YOUTUBE_STREAM_KEY}" ]; then
            echo "::warning::OAuth is missing; this run will reuse the legacy YouTube broadcast."
          else
            echo "::error::Neither YouTube OAuth nor legacy RTMP publishing is fully configured."
            exit 1
          fi
        env:
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
          YOUTUBE_RTMP_URL: ${{ secrets.YOUTUBE_RTMP_URL }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}

      - name: Create and bind fresh YouTube broadcast
        id: youtube
        if: ${{ steps.block.outputs.block_start != '' }}
        run: npx tsx scripts/create-youtube-broadcast.ts
        env:
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
          YOUTUBE_RTMP_URL: ${{ secrets.YOUTUBE_RTMP_URL }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          YOUTUBE_LEGACY_VIDEO_ID: ${{ secrets.NEXT_PUBLIC_YOUTUBE_VIDEO_ID }}
          YOUTUBE_PRIVACY_STATUS: ${{ vars.YOUTUBE_PRIVACY_STATUS || 'unlisted' }}
          BROADCAST_START_AT: ${{ steps.block.outputs.block_start }}
          BROADCAST_DURATION_SECONDS: ${{ steps.block.outputs.duration_seconds }}
          BROADCAST_TITLE: ${{ steps.block.outputs.broadcast_title }}

      - name: Enable and verify YouTube embedding
        if: ${{ steps.block.outputs.block_start != '' }}
        run: |
          npx tsx scripts/enable-youtube-embed.ts
          EMBED_URL="https://www.youtube.com/embed/${YOUTUBE_VIDEO_ID}?origin=https%3A%2F%2Fconferencehype.com&widget_referrer=https%3A%2F%2Fconferencehype.com"
          EMBED_HTML=$(curl --fail --silent --show-error \
            -H "Referer: https://conferencehype.com/" \
            "${EMBED_URL}")
          if grep -Eq "EMBEDDER_IDENTITY_MISSING_REFERRER|Playback on other websites has been disabled|disabled by the video owner" <<< "${EMBED_HTML}"; then
            echo "::warning::YouTube rejected embedded playback on conferencehype.com; continuing so the direct YouTube broadcast can still run."
            echo "Embed repair can be handled separately from the YouTube stream."
            exit 0
          fi
          echo "YouTube embedding preflight passed for ${YOUTUBE_VIDEO_ID}."
        env:
          YOUTUBE_VIDEO_ID: ${{ steps.youtube.outputs.youtube_video_id }}
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Save YouTube video link
        if: ${{ steps.block.outputs.block_start != '' }}
        run: npx tsx scripts/update-youtube-delivery.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COVERAGE_SLOT_ID: ${{ steps.block.outputs.slot_id }}
          YOUTUBE_DELIVERY_STATUS: queued
          YOUTUBE_VIDEO_ID: ${{ steps.youtube.outputs.youtube_video_id }}
          YOUTUBE_VIDEO_URL: ${{ steps.youtube.outputs.youtube_url }}

      - name: Render current presentation
        if: ${{ steps.block.outputs.block_start != '' }}
        run: |
          export HOUR_BROADCAST_SECONDS=${{ steps.block.outputs.duration_seconds }}
          npx tsx scripts/render-hour-broadcast.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          HOUR_BROADCAST_MODE: presentation
          FFMPEG_PATH: /usr/bin/ffmpeg
          HOUR_BROADCAST_START: ${{ steps.block.outputs.block_start }}
          BROADCAST_TITLE: ${{ steps.block.outputs.broadcast_title }}
          COVERAGE_SLOT_ID: ${{ steps.block.outputs.slot_id }}
          YOUTUBE_VIDEO_ID: ${{ steps.youtube.outputs.youtube_video_id }}
          YOUTUBE_VIDEO_URL: ${{ steps.youtube.outputs.youtube_url }}
          HOUR_BROADCAST_OUTPUT: public/rendered/conferencehype-hour-broadcast.mp4
          KOKORO_PYTHON_CMD: python3
          VOICE_AETHER_VALE: ${{ secrets.VOICE_AETHER_VALE }}
          VOICE_AMARA_SOL: ${{ secrets.VOICE_AMARA_SOL }}
          VOICE_BENJI_CROSS: ${{ secrets.VOICE_BENJI_CROSS }}
          VOICE_DIEGO_VALE: ${{ secrets.VOICE_DIEGO_VALE }}
          VOICE_ECHO_SAGE: ${{ secrets.VOICE_ECHO_SAGE }}
          VOICE_ELENA_PARK: ${{ secrets.VOICE_ELENA_PARK }}
          VOICE_GRANT_IVEY: ${{ secrets.VOICE_GRANT_IVEY }}
          VOICE_KAI_LENNOX: ${{ secrets.VOICE_KAI_LENNOX }}
          VOICE_LUNA_VALE: ${{ secrets.VOICE_LUNA_VALE }}
          VOICE_MILES_CARTER: ${{ secrets.VOICE_MILES_CARTER }}
          VOICE_NOVA_QUINN: ${{ secrets.VOICE_NOVA_QUINN }}
          VOICE_ORION_REED: ${{ secrets.VOICE_ORION_REED }}
          VOICE_RILEY_KNOX: ${{ secrets.VOICE_RILEY_KNOX }}
          VOICE_SAGE_HARLAN: ${{ secrets.VOICE_SAGE_HARLAN }}
          VOICE_SOFIA_REYES: ${{ secrets.VOICE_SOFIA_REYES }}
          VOICE_TALIA_STONE: ${{ secrets.VOICE_TALIA_STONE }}
          VOICE_VESPER_QUILL: ${{ secrets.VOICE_VESPER_QUILL }}

      - name: Verify public stream and writeout alignment
        if: ${{ steps.block.outputs.block_start != '' }}
        run: npx tsx scripts/verify-public-broadcast-alignment.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_VIDEO_ID: ${{ steps.youtube.outputs.youtube_video_id }}

      - name: Wait for requested start time
        if: ${{ steps.block.outputs.block_start != '' }}
        run: |
          START_EPOCH=$(date -d "${{ steps.block.outputs.block_start }}" +%s)
          NOW_EPOCH=$(date -u +%s)
          WAIT_SECONDS=$((START_EPOCH - NOW_EPOCH))
          if [ "$WAIT_SECONDS" -gt 0 ]; then
            echo "Render is ready. Waiting ${WAIT_SECONDS}s for the selected start time."
            sleep "$WAIT_SECONDS"
          fi

      - name: Validate rendered broadcast media
        if: ${{ steps.block.outputs.block_start != '' }}
        run: |
          test -s public/rendered/conferencehype-hour-broadcast.mp4 || {
            echo "::error::Rendered broadcast is missing or empty"
            exit 1
          }
          VIDEO_STREAMS=$(ffprobe -v error -select_streams v:0 \
            -show_entries stream=codec_type -of csv=p=0 \
            public/rendered/conferencehype-hour-broadcast.mp4 | wc -l)
          AUDIO_STREAMS=$(ffprobe -v error -select_streams a:0 \
            -show_entries stream=codec_type -of csv=p=0 \
            public/rendered/conferencehype-hour-broadcast.mp4 | wc -l)
          test "${VIDEO_STREAMS}" -ge 1 || {
            echo "::error::Rendered broadcast has no video stream"
            exit 1
          }
          test "${AUDIO_STREAMS}" -ge 1 || {
            echo "::error::Rendered broadcast has no audio stream"
            exit 1
          }
          echo "Rendered broadcast contains video and audio."

      - name: Start rendered YouTube stream
        if: ${{ steps.block.outputs.block_start != '' }}
        run: |
          export STREAM_DURATION_SECONDS=${{ steps.block.outputs.duration_seconds }}
          npx tsx scripts/youtube-hour-presentation-stream.ts
        env:
          YOUTUBE_RTMP_URL: ${{ steps.youtube.outputs.rtmp_url }}
          YOUTUBE_STREAM_KEY: ${{ steps.youtube.outputs.stream_key }}
          FFMPEG_PATH: /usr/bin/ffmpeg
          STREAM_VIDEO_PATH: public/rendered/conferencehype-hour-broadcast.mp4
          COVERAGE_SLOT_ID: ${{ steps.block.outputs.slot_id }}
          YOUTUBE_VIDEO_ID: ${{ steps.youtube.outputs.youtube_video_id }}
          YOUTUBE_VIDEO_URL: ${{ steps.youtube.outputs.youtube_url }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Verify completed YouTube handoff
        if: ${{ steps.block.outputs.block_start != '' }}
        run: npx tsx scripts/verify-public-broadcast-alignment.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_VIDEO_ID: ${{ steps.youtube.outputs.youtube_video_id }}
          EXPECTED_YOUTUBE_STATUS: completed

      - name: Start fallback YouTube RTMP loop
        if: ${{ github.event_name == 'workflow_dispatch' && steps.block.outputs.block_start == '' }}
        run: npm run job:stream
        env:
          YOUTUBE_RTMP_URL: ${{ secrets.YOUTUBE_RTMP_URL }}
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          STREAM_INPUT_PATH: ${{ inputs.stream_input_path || 'public/rendered/fallback-loop.mp4' }}
          STREAM_DURATION_SECONDS: ""

      - name: Record failed YouTube delivery
        if: ${{ always() && steps.block.outputs.block_start != '' && job.status == 'failure' }}
        run: npx tsx scripts/update-youtube-delivery.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COVERAGE_SLOT_ID: ${{ steps.block.outputs.slot_id }}
          YOUTUBE_DELIVERY_STATUS: failed
          YOUTUBE_VIDEO_ID: ${{ steps.youtube.outputs.youtube_video_id }}
          YOUTUBE_VIDEO_URL: ${{ steps.youtube.outputs.youtube_url }}
          YOUTUBE_DELIVERY_ERROR: GitHub Actions failed before the YouTube delivery completed. Open the workflow run for the exact failing step.
