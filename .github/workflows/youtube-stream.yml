name: YouTube stream

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: "Fallback render duration when a mode-specific override doesn't apply"
        required: true
        default: "60"
        type: choice
        options:
          - "10"
          - "30"
          - "60"
      stream_input_path:
        description: "Unused (kept for compatibility with older dispatch callers)"
        required: false
        default: "public/rendered/fallback-loop.mp4"
      stream_start_time:
        description: "ISO start time for rendering the correct rundown cards and scheduling the YouTube publish time"
        required: false
        default: ""
      coverage_slot_id:
        description: "Optional conference coverage slot UUID for delivery tracking"
        required: false
        default: ""
      journal_broadcast_slot_id:
        description: "Optional journal_broadcast_slots UUID for a 30-minute single-journal test (also requires journal_id)"
        required: false
        default: ""
      journal_id:
        description: "Journal UUID -- when set, this run builds a 30-minute single-journal show (HOUR_BROADCAST_MODE=journal30) instead of the default hourly format"
        required: false
        default: ""
  schedule:
    # Poll the approved admin programming plan. Uploads go public immediately
    # on completion (2026-07-17 -- no more private+publishAt scheduling), so
    # this cron cadence *is* the effective air-time precision: a slot goes
    # live whenever this run happens to pick it up and finish rendering, not
    # at a scheduled second.
    - cron: "15 * * * *"

jobs:
  stream:
    runs-on: ubuntu-latest
    # Render + upload typically finish in single-digit minutes; this is a
    # generous ceiling, not an expected duration.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg

      # Resolve a saved conference coverage slot or an explicit dispatch time.
      - name: Resolve block start time
        id: block
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            # Look back 30 min to catch slots that should have been picked up
            # if the runner started late (GitHub Actions runners can be 20-30 min
            # delayed under load). Look ahead 90 min as the upper bound.
            # youtube_status=not_scheduled prevents double-triggering.
            FROM=$(date -u -d "-30 minutes" +"%Y-%m-%dT%H:%M:%SZ")
            TO=$(date -u -d "+90 minutes" +"%Y-%m-%dT%H:%M:%SZ")
            RECORD=$(curl --fail --silent --show-error \
              --get "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/conference_coverage_slots" \
              -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              --data-urlencode "select=id,starts_at,duration_hours,medical_conferences(name,acronym)" \
              --data-urlencode "enabled=eq.true" \
              --data-urlencode "approval_status=eq.approved" \
              --data-urlencode "youtube_status=eq.not_scheduled" \
              --data-urlencode "starts_at=gte.${FROM}" \
              --data-urlencode "starts_at=lt.${TO}" \
              --data-urlencode "order=starts_at.asc" \
              --data-urlencode "limit=1" | jq -c '.[0] // {}')
            SLOT_ID=$(jq -r '.id // empty' <<< "${RECORD}")
            BLOCK_START=$(jq -r '.starts_at // empty' <<< "${RECORD}")
            DURATION_HOURS=$(jq -r '.duration_hours // 1' <<< "${RECORD}")
            CONFERENCE_NAME=$(jq -r '.medical_conferences.acronym // .medical_conferences.name // "ConferenceHype"' <<< "${RECORD}")
            DURATION_SECONDS=$((DURATION_HOURS * 3600))
          else
            SLOT_ID="${{ inputs.coverage_slot_id }}"
            BLOCK_START="${{ inputs.stream_start_time }}"
            CONFERENCE_NAME="ConferenceHype"
            DURATION_SECONDS=$(( ${{ inputs.duration_minutes || 60 }} * 60 ))
            JOURNAL_SLOT_ID="${{ inputs.journal_broadcast_slot_id }}"
            JOURNAL_ID="${{ inputs.journal_id }}"
            if [ -n "${JOURNAL_ID}" ]; then
              BROADCAST_MODE="journal30"
              # render-hour-broadcast.ts hardcodes JOURNAL_SHOW_SECONDS (1800)
              # for this mode regardless of this input -- kept in sync here
              # only so duration_seconds is honest if anything else reads it.
              DURATION_SECONDS=1800
            fi
          fi
          if [ -z "${BLOCK_START}" ]; then
            echo "::notice::No approved programming block is ready for publishing."
          fi
          echo "slot_id=${SLOT_ID}" >> $GITHUB_OUTPUT
          echo "journal_slot_id=${JOURNAL_SLOT_ID}" >> $GITHUB_OUTPUT
          echo "journal_id=${JOURNAL_ID}" >> $GITHUB_OUTPUT
          echo "broadcast_mode=${BROADCAST_MODE}" >> $GITHUB_OUTPUT
          echo "block_start=${BLOCK_START}" >> $GITHUB_OUTPUT
          echo "duration_seconds=${DURATION_SECONDS}" >> $GITHUB_OUTPUT
          # Never set an explicit title here -- leaving broadcast_title unset
          # lets render-hour-broadcast.ts's journal-aware title builder
          # (working from the actual rendered cards) always be the effective
          # title. BROADCAST_TITLE remains a valid manual override if a
          # future workflow_dispatch input for it is ever added.
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Validate YouTube OAuth is configured
        if: ${{ steps.block.outputs.block_start != '' }}
        run: |
          if [ -z "${YOUTUBE_OAUTH_CLIENT_ID}" ] || [ -z "${YOUTUBE_OAUTH_CLIENT_SECRET}" ] || [ -z "${YOUTUBE_OAUTH_REFRESH_TOKEN}" ]; then
            echo "::error::YouTube OAuth is not fully configured -- uploads require it (there is no upload equivalent of a raw RTMP stream key)."
            exit 1
          fi
        env:
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Install Kokoro TTS dependencies
        if: ${{ steps.block.outputs.block_start != '' }}
        run: pip install kokoro numpy soundfile

      - name: Mark programming block as rendering
        if: ${{ steps.block.outputs.slot_id != '' || steps.block.outputs.journal_slot_id != '' }}
        run: npx tsx scripts/update-youtube-delivery.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COVERAGE_SLOT_ID: ${{ steps.block.outputs.slot_id }}
          JOURNAL_SLOT_ID: ${{ steps.block.outputs.journal_slot_id }}
          YOUTUBE_DELIVERY_STATUS: rendering

      # Render, then upload the finished file to YouTube (public immediately),
      # then mark segments rendered and write youtube_status=queued -- all in
      # one process now that there's no live broadcast to create before
      # rendering and no RTMP connection to hand off to afterward.
      - name: Render and upload presentation
        id: render
        if: ${{ steps.block.outputs.block_start != '' }}
        run: |
          export HOUR_BROADCAST_SECONDS=${{ steps.block.outputs.duration_seconds }}
          npx tsx scripts/render-hour-broadcast.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          HOUR_BROADCAST_MODE: ${{ steps.block.outputs.broadcast_mode || 'presentation' }}
          JOURNAL_ID: ${{ steps.block.outputs.journal_id }}
          JOURNAL_SLOT_ID: ${{ steps.block.outputs.journal_slot_id }}
          FFMPEG_PATH: /usr/bin/ffmpeg
          HOUR_BROADCAST_START: ${{ steps.block.outputs.block_start }}
          BROADCAST_TITLE: ${{ steps.block.outputs.broadcast_title }}
          COVERAGE_SLOT_ID: ${{ steps.block.outputs.slot_id }}
          PUBLIC_SITE_URL: https://conferencehype.com
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
          HOUR_BROADCAST_OUTPUT: public/rendered/conferencehype-hour-broadcast.mp4
          KOKORO_PYTHON_CMD: python3
          VOICE_AETHER_VALE: ${{ secrets.VOICE_AETHER_VALE }}
          VOICE_AMARA_SOL: ${{ secrets.VOICE_AMARA_SOL }}
          VOICE_BENJI_CROSS: ${{ secrets.VOICE_BENJI_CROSS }}
          VOICE_DIEGO_VALE: ${{ secrets.VOICE_DIEGO_VALE }}
          VOICE_ECHO_SAGE: ${{ secrets.VOICE_ECHO_SAGE }}
          VOICE_ELENA_PARK: ${{ secrets.VOICE_ELENA_PARK }}
          VOICE_GRANT_IVEY: ${{ secrets.VOICE_GRANT_IVEY }}
          VOICE_KAI_LENNOX: ${{ secrets.VOICE_KAI_LENNOX }}
          VOICE_LUNA_VALE: ${{ secrets.VOICE_LUNA_VALE }}
          VOICE_MILES_CARTER: ${{ secrets.VOICE_MILES_CARTER }}
          VOICE_NOVA_QUINN: ${{ secrets.VOICE_NOVA_QUINN }}
          VOICE_ORION_REED: ${{ secrets.VOICE_ORION_REED }}
          VOICE_RILEY_KNOX: ${{ secrets.VOICE_RILEY_KNOX }}
          VOICE_SAGE_HARLAN: ${{ secrets.VOICE_SAGE_HARLAN }}
          VOICE_SOFIA_REYES: ${{ secrets.VOICE_SOFIA_REYES }}
          VOICE_TALIA_STONE: ${{ secrets.VOICE_TALIA_STONE }}
          VOICE_VESPER_QUILL: ${{ secrets.VOICE_VESPER_QUILL }}

      - name: Verify public stream and writeout alignment
        if: ${{ steps.block.outputs.block_start != '' }}
        run: npx tsx scripts/verify-public-broadcast-alignment.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOURNAL_SLOT_ID: ${{ steps.block.outputs.journal_slot_id }}

      - name: Verify YouTube upload
        if: ${{ steps.block.outputs.block_start != '' }}
        run: npx tsx scripts/verify-youtube-delivery-loop.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_VIDEO_ID: ${{ steps.render.outputs.youtube_video_id }}
          YOUTUBE_VIDEO_URL: ${{ steps.render.outputs.youtube_url }}
          JOURNAL_SLOT_ID: ${{ steps.block.outputs.journal_slot_id }}
          YOUTUBE_VERIFY_TIMEOUT_SECONDS: 120
          YOUTUBE_VERIFY_INTERVAL_SECONDS: 10
          STREAM_VIDEO_PATH: public/rendered/conferencehype-hour-broadcast.mp4
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Record failed YouTube delivery
        if: ${{ always() && steps.block.outputs.block_start != '' && job.status == 'failure' }}
        run: npx tsx scripts/update-youtube-delivery.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          COVERAGE_SLOT_ID: ${{ steps.block.outputs.slot_id }}
          JOURNAL_SLOT_ID: ${{ steps.block.outputs.journal_slot_id }}
          YOUTUBE_DELIVERY_STATUS: failed
          YOUTUBE_DELIVERY_ERROR: GitHub Actions failed before the YouTube upload completed. Open the workflow run for the exact failing step.
