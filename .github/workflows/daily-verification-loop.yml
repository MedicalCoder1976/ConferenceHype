name: Daily verification loop

on:
  workflow_dispatch:
    inputs:
      attempts:
        description: "Maximum randomized platform smoke attempts before failing"
        required: true
        default: "10"
      stream_minutes:
        description: "Smoke stream duration in minutes"
        required: true
        default: "10"
      repair_cycle:
        description: "Internal full-loop repair cycle counter"
        required: true
        default: "0"
  schedule:
    # One daily verification loop for static checks, source checks, platform smoke,
    # public handoff, YouTube visibility repair, and delivery verification.
    - cron: "0 8 * * *"

permissions:
  actions: write
  contents: read
  issues: write

env:
  DAILY_VERIFICATION_MAX_REPAIR_CYCLES: "12"

concurrency:
  group: daily-verification-loop
  cancel-in-progress: false

jobs:
  verify-all:
    runs-on: ubuntu-latest
    timeout-minutes: 420
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npm run typecheck 2>&1 | tee typecheck.log

      - name: Broadcast guard verification
        id: guards
        continue-on-error: true
        run: npm run test:guards 2>&1 | tee broadcast-guards.log

      - name: Build
        id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log

      - name: RSS source verification
        id: rss
        continue-on-error: true
        run: npm run test:rss 2>&1 | tee rss-verification.log

      - name: Refresh source ingestion after RSS failure
        if: ${{ steps.rss.outcome == 'failure' }}
        id: rss_repair_ingest
        continue-on-error: true
        run: npm run job:ingest 2>&1 | tee rss-repair-ingest.log
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: RSS source verification after repair
        if: ${{ steps.rss.outcome == 'failure' }}
        id: rss_after_repair
        continue-on-error: true
        run: npm run test:rss 2>&1 | tee rss-verification-after-repair.log

      - name: Generate weekly source cards
        id: weekly_cards
        continue-on-error: true
        run: npm run job:weekly-source-cards 2>&1 | tee weekly-source-cards.log
        env:
          WEEKLY_SOURCE_CARDS_PER_SOURCE: "2"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

      - name: Verify weekly source cards
        id: weekly_cards_verify
        continue-on-error: true
        run: npm run test:weekly-source-cards 2>&1 | tee weekly-source-cards-verify.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Repair weekly source cards
        if: ${{ steps.weekly_cards_verify.outcome == 'failure' }}
        id: weekly_cards_repair
        continue-on-error: true
        run: npm run job:weekly-source-cards 2>&1 | tee weekly-source-cards-repair.log
        env:
          WEEKLY_SOURCE_CARDS_PER_SOURCE: "2"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}

      - name: Verify weekly source cards after repair
        if: ${{ steps.weekly_cards_verify.outcome == 'failure' }}
        id: weekly_cards_after_repair
        continue-on-error: true
        run: npm run test:weekly-source-cards 2>&1 | tee weekly-source-cards-after-repair.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Randomized platform smoke loop
        id: smoke
        continue-on-error: true
        run: |
          set -o pipefail
          npm run verify:platform-smoke 2>&1 | tee platform-smoke-loop.log
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PLATFORM_SMOKE_REF: ${{ github.ref_name }}
          PLATFORM_SMOKE_ATTEMPTS: ${{ inputs.attempts || '10' }}
          PLATFORM_SMOKE_STREAM_MINUTES: ${{ inputs.stream_minutes || '10' }}
          PLATFORM_SMOKE_START_DELAY_MINUTES: "2"
          PLATFORM_SMOKE_WORKFLOW_TIMEOUT_MINUTES: "150"
          PLATFORM_SMOKE_FINAL_VERIFY_TIMEOUT_SECONDS: "300"
          PLATFORM_SMOKE_MAX_CARDS: "3"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_EXPECT_PRIVACY_STATUS: public
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Repair platform smoke with a second pass
        if: ${{ steps.smoke.outcome == 'failure' }}
        id: smoke_after_repair
        continue-on-error: true
        run: |
          set -o pipefail
          npm run verify:platform-smoke 2>&1 | tee platform-smoke-loop-after-repair.log
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PLATFORM_SMOKE_REF: ${{ github.ref_name }}
          PLATFORM_SMOKE_ATTEMPTS: "3"
          PLATFORM_SMOKE_STREAM_MINUTES: ${{ inputs.stream_minutes || '10' }}
          PLATFORM_SMOKE_START_DELAY_MINUTES: "2"
          PLATFORM_SMOKE_WORKFLOW_TIMEOUT_MINUTES: "120"
          PLATFORM_SMOKE_FINAL_VERIFY_TIMEOUT_SECONDS: "300"
          PLATFORM_SMOKE_MAX_CARDS: "3"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_EXPECT_PRIVACY_STATUS: public
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Resolve public stream handoff
        id: stream
        continue-on-error: true
        run: |
          STATUS_JSON=$(curl --fail --silent --show-error --location https://conferencehype.com/api/stream/status)
          echo "${STATUS_JSON}" > stream-status.json
          VIDEO_ID=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('stream-status.json','utf8')).streamState||{}; process.stdout.write(s.youtubeVideoId||'')")
          VIDEO_URL=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('stream-status.json','utf8')).streamState||{}; process.stdout.write(s.youtubeUrl||'')")
          YOUTUBE_STATUS=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('stream-status.json','utf8')).streamState||{}; process.stdout.write(s.youtubeStatus||'not_scheduled')")
          if [ -z "${VIDEO_ID}" ]; then
            echo "::warning::conferencehype.com/api/stream/status does not report a YouTube video ID."
            cat stream-status.json
            echo "unsupported_state=true" >> "$GITHUB_OUTPUT"
            echo "unsupported_reason=conferencehype.com/api/stream/status does not report a YouTube video ID." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${YOUTUBE_STATUS}" = "completed" ]; then
            VERIFY_PHASE="completed"
          elif [ "${YOUTUBE_STATUS}" = "live" ]; then
            VERIFY_PHASE="live"
          else
            echo "::warning::Current YouTube status is ${YOUTUBE_STATUS}; expected live or completed for daily verification."
            cat stream-status.json
            echo "video_id=${VIDEO_ID}" >> "$GITHUB_OUTPUT"
            echo "video_url=${VIDEO_URL}" >> "$GITHUB_OUTPUT"
            echo "youtube_status=${YOUTUBE_STATUS}" >> "$GITHUB_OUTPUT"
            echo "unsupported_state=true" >> "$GITHUB_OUTPUT"
            echo "unsupported_reason=Current YouTube status is ${YOUTUBE_STATUS}; expected live or completed for daily verification." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "video_id=${VIDEO_ID}" >> "$GITHUB_OUTPUT"
          echo "video_url=${VIDEO_URL}" >> "$GITHUB_OUTPUT"
          echo "verify_phase=${VERIFY_PHASE}" >> "$GITHUB_OUTPUT"
          echo "youtube_status=${YOUTUBE_STATUS}" >> "$GITHUB_OUTPUT"
          echo "unsupported_state=false" >> "$GITHUB_OUTPUT"

      - name: Repair unsupported public handoff with smoke pass
        if: ${{ steps.stream.outputs.unsupported_state == 'true' }}
        id: handoff_repair_smoke
        continue-on-error: true
        run: |
          set -o pipefail
          npm run verify:platform-smoke 2>&1 | tee handoff-repair-smoke.log
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PLATFORM_SMOKE_REF: ${{ github.ref_name }}
          PLATFORM_SMOKE_ATTEMPTS: "3"
          PLATFORM_SMOKE_STREAM_MINUTES: ${{ inputs.stream_minutes || '10' }}
          PLATFORM_SMOKE_START_DELAY_MINUTES: "2"
          PLATFORM_SMOKE_WORKFLOW_TIMEOUT_MINUTES: "120"
          PLATFORM_SMOKE_FINAL_VERIFY_TIMEOUT_SECONDS: "300"
          PLATFORM_SMOKE_MAX_CARDS: "3"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_EXPECT_PRIVACY_STATUS: public
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Resolve public stream handoff after repair
        if: ${{ steps.stream.outputs.unsupported_state == 'true' }}
        id: stream_after_repair
        continue-on-error: true
        run: |
          STATUS_JSON=$(curl --fail --silent --show-error --location https://conferencehype.com/api/stream/status)
          echo "${STATUS_JSON}" > stream-status-after-repair.json
          VIDEO_ID=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('stream-status-after-repair.json','utf8')).streamState||{}; process.stdout.write(s.youtubeVideoId||'')")
          VIDEO_URL=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('stream-status-after-repair.json','utf8')).streamState||{}; process.stdout.write(s.youtubeUrl||'')")
          YOUTUBE_STATUS=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('stream-status-after-repair.json','utf8')).streamState||{}; process.stdout.write(s.youtubeStatus||'not_scheduled')")
          if [ -z "${VIDEO_ID}" ]; then
            echo "unsupported_state=true" >> "$GITHUB_OUTPUT"
            echo "unsupported_reason=conferencehype.com/api/stream/status still does not report a YouTube video ID after repair." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "${YOUTUBE_STATUS}" = "completed" ]; then
            VERIFY_PHASE="completed"
          elif [ "${YOUTUBE_STATUS}" = "live" ]; then
            VERIFY_PHASE="live"
          else
            echo "video_id=${VIDEO_ID}" >> "$GITHUB_OUTPUT"
            echo "video_url=${VIDEO_URL}" >> "$GITHUB_OUTPUT"
            echo "youtube_status=${YOUTUBE_STATUS}" >> "$GITHUB_OUTPUT"
            echo "unsupported_state=true" >> "$GITHUB_OUTPUT"
            echo "unsupported_reason=Current YouTube status is ${YOUTUBE_STATUS}; expected live or completed after repair." >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "video_id=${VIDEO_ID}" >> "$GITHUB_OUTPUT"
          echo "video_url=${VIDEO_URL}" >> "$GITHUB_OUTPUT"
          echo "verify_phase=${VERIFY_PHASE}" >> "$GITHUB_OUTPUT"
          echo "youtube_status=${YOUTUBE_STATUS}" >> "$GITHUB_OUTPUT"
          echo "unsupported_state=false" >> "$GITHUB_OUTPUT"

      - name: Select delivery handoff
        id: delivery_handoff
        run: |
          if [ "${INITIAL_UNSUPPORTED}" != "true" ]; then
            echo "video_id=${INITIAL_VIDEO_ID}" >> "$GITHUB_OUTPUT"
            echo "video_url=${INITIAL_VIDEO_URL}" >> "$GITHUB_OUTPUT"
            echo "verify_phase=${INITIAL_VERIFY_PHASE}" >> "$GITHUB_OUTPUT"
            echo "youtube_status=${INITIAL_YOUTUBE_STATUS}" >> "$GITHUB_OUTPUT"
            echo "unsupported_state=false" >> "$GITHUB_OUTPUT"
            echo "source=initial" >> "$GITHUB_OUTPUT"
          elif [ "${REPAIRED_UNSUPPORTED}" != "true" ] && [ -n "${REPAIRED_VIDEO_ID}" ]; then
            echo "video_id=${REPAIRED_VIDEO_ID}" >> "$GITHUB_OUTPUT"
            echo "video_url=${REPAIRED_VIDEO_URL}" >> "$GITHUB_OUTPUT"
            echo "verify_phase=${REPAIRED_VERIFY_PHASE}" >> "$GITHUB_OUTPUT"
            echo "youtube_status=${REPAIRED_YOUTUBE_STATUS}" >> "$GITHUB_OUTPUT"
            echo "unsupported_state=false" >> "$GITHUB_OUTPUT"
            echo "source=repaired" >> "$GITHUB_OUTPUT"
          else
            echo "video_id=${REPAIRED_VIDEO_ID:-$INITIAL_VIDEO_ID}" >> "$GITHUB_OUTPUT"
            echo "video_url=${REPAIRED_VIDEO_URL:-$INITIAL_VIDEO_URL}" >> "$GITHUB_OUTPUT"
            echo "youtube_status=${REPAIRED_YOUTUBE_STATUS:-$INITIAL_YOUTUBE_STATUS}" >> "$GITHUB_OUTPUT"
            echo "unsupported_state=true" >> "$GITHUB_OUTPUT"
            echo "unsupported_reason=${REPAIRED_REASON:-$INITIAL_REASON}" >> "$GITHUB_OUTPUT"
            echo "source=unresolved" >> "$GITHUB_OUTPUT"
          fi
        env:
          INITIAL_UNSUPPORTED: ${{ steps.stream.outputs.unsupported_state }}
          INITIAL_REASON: ${{ steps.stream.outputs.unsupported_reason }}
          INITIAL_VIDEO_ID: ${{ steps.stream.outputs.video_id }}
          INITIAL_VIDEO_URL: ${{ steps.stream.outputs.video_url }}
          INITIAL_VERIFY_PHASE: ${{ steps.stream.outputs.verify_phase }}
          INITIAL_YOUTUBE_STATUS: ${{ steps.stream.outputs.youtube_status }}
          REPAIRED_UNSUPPORTED: ${{ steps.stream_after_repair.outputs.unsupported_state }}
          REPAIRED_REASON: ${{ steps.stream_after_repair.outputs.unsupported_reason }}
          REPAIRED_VIDEO_ID: ${{ steps.stream_after_repair.outputs.video_id }}
          REPAIRED_VIDEO_URL: ${{ steps.stream_after_repair.outputs.video_url }}
          REPAIRED_VERIFY_PHASE: ${{ steps.stream_after_repair.outputs.verify_phase }}
          REPAIRED_YOUTUBE_STATUS: ${{ steps.stream_after_repair.outputs.youtube_status }}

      - name: Verify YouTube delivery
        if: ${{ steps.delivery_handoff.outputs.unsupported_state != 'true' }}
        id: verify_initial
        continue-on-error: true
        run: npx tsx scripts/verify-youtube-delivery-loop.ts 2>&1 | tee verify-initial.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_VIDEO_ID: ${{ steps.delivery_handoff.outputs.video_id }}
          YOUTUBE_VIDEO_URL: ${{ steps.delivery_handoff.outputs.video_url }}
          YOUTUBE_VERIFY_PHASE: ${{ steps.delivery_handoff.outputs.verify_phase }}
          YOUTUBE_EXPECT_PRIVACY_STATUS: public
          YOUTUBE_VERIFY_TIMEOUT_SECONDS: 120
          YOUTUBE_VERIFY_INTERVAL_SECONDS: 20
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Repair YouTube visibility
        if: ${{ steps.delivery_handoff.outputs.unsupported_state != 'true' && steps.verify_initial.outcome == 'failure' }}
        id: repair_visibility
        continue-on-error: true
        run: npx tsx scripts/update-youtube-video-privacy.ts 2>&1 | tee repair-visibility.log
        env:
          YOUTUBE_VIDEO_ID: ${{ steps.delivery_handoff.outputs.video_id }}
          YOUTUBE_PRIVACY_STATUS: public
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Verify YouTube delivery after repair
        if: ${{ steps.delivery_handoff.outputs.unsupported_state != 'true' && steps.verify_initial.outcome == 'failure' }}
        id: verify_after_repair
        continue-on-error: true
        run: npx tsx scripts/verify-youtube-delivery-loop.ts 2>&1 | tee verify-after-repair.log
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          YOUTUBE_VIDEO_ID: ${{ steps.delivery_handoff.outputs.video_id }}
          YOUTUBE_VIDEO_URL: ${{ steps.delivery_handoff.outputs.video_url }}
          YOUTUBE_VERIFY_PHASE: ${{ steps.delivery_handoff.outputs.verify_phase }}
          YOUTUBE_EXPECT_PRIVACY_STATUS: public
          YOUTUBE_VERIFY_TIMEOUT_SECONDS: 180
          YOUTUBE_VERIFY_INTERVAL_SECONDS: 20
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}

      - name: Plan next full-loop repair cycle
        id: repair_loop
        if: ${{ always() }}
        run: |
          set -euo pipefail
          UNRESOLVED=false
          if [ "${TYPECHECK_OUTCOME}" = "failure" ]; then UNRESOLVED=true; fi
          if [ "${GUARDS_OUTCOME}" = "failure" ]; then UNRESOLVED=true; fi
          if [ "${BUILD_OUTCOME}" = "failure" ]; then UNRESOLVED=true; fi
          if [ "${RSS_OUTCOME}" = "failure" ] && [ "${RSS_AFTER_REPAIR_OUTCOME}" != "success" ]; then UNRESOLVED=true; fi
          if [ "${WEEKLY_CARDS_OUTCOME}" = "failure" ] && [ "${WEEKLY_CARDS_REPAIR_OUTCOME}" != "success" ]; then UNRESOLVED=true; fi
          if [ "${WEEKLY_CARDS_VERIFY_OUTCOME}" = "failure" ] && [ "${WEEKLY_CARDS_AFTER_REPAIR_OUTCOME}" != "success" ]; then UNRESOLVED=true; fi
          if [ "${SMOKE_OUTCOME}" = "failure" ] && [ "${SMOKE_AFTER_REPAIR_OUTCOME}" != "success" ]; then UNRESOLVED=true; fi
          if [ "${DELIVERY_UNSUPPORTED}" = "true" ]; then UNRESOLVED=true; fi
          if [ "${VERIFY_INITIAL_OUTCOME}" = "failure" ] && [ "${VERIFY_AFTER_REPAIR_OUTCOME}" != "success" ]; then UNRESOLVED=true; fi

          CURRENT_CYCLE="${REPAIR_CYCLE:-0}"
          if ! [[ "${CURRENT_CYCLE}" =~ ^[0-9]+$ ]]; then CURRENT_CYCLE=0; fi
          NEXT_CYCLE=$((CURRENT_CYCLE + 1))
          SHOULD_RERUN=false
          SHOULD_REPORT=false
          if [ "${UNRESOLVED}" = "true" ]; then
            if [ "${CURRENT_CYCLE}" -lt "${DAILY_VERIFICATION_MAX_REPAIR_CYCLES}" ]; then
              SHOULD_RERUN=true
            else
              SHOULD_REPORT=true
            fi
          fi

          echo "unresolved=${UNRESOLVED}" >> "$GITHUB_OUTPUT"
          echo "current_cycle=${CURRENT_CYCLE}" >> "$GITHUB_OUTPUT"
          echo "next_cycle=${NEXT_CYCLE}" >> "$GITHUB_OUTPUT"
          echo "should_rerun=${SHOULD_RERUN}" >> "$GITHUB_OUTPUT"
          echo "should_report=${SHOULD_REPORT}" >> "$GITHUB_OUTPUT"
        env:
          REPAIR_CYCLE: ${{ inputs.repair_cycle || '0' }}
          TYPECHECK_OUTCOME: ${{ steps.typecheck.outcome }}
          GUARDS_OUTCOME: ${{ steps.guards.outcome }}
          BUILD_OUTCOME: ${{ steps.build.outcome }}
          RSS_OUTCOME: ${{ steps.rss.outcome }}
          RSS_AFTER_REPAIR_OUTCOME: ${{ steps.rss_after_repair.outcome }}
          WEEKLY_CARDS_OUTCOME: ${{ steps.weekly_cards.outcome }}
          WEEKLY_CARDS_VERIFY_OUTCOME: ${{ steps.weekly_cards_verify.outcome }}
          WEEKLY_CARDS_REPAIR_OUTCOME: ${{ steps.weekly_cards_repair.outcome }}
          WEEKLY_CARDS_AFTER_REPAIR_OUTCOME: ${{ steps.weekly_cards_after_repair.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          SMOKE_AFTER_REPAIR_OUTCOME: ${{ steps.smoke_after_repair.outcome }}
          DELIVERY_UNSUPPORTED: ${{ steps.delivery_handoff.outputs.unsupported_state }}
          VERIFY_INITIAL_OUTCOME: ${{ steps.verify_initial.outcome }}
          VERIFY_AFTER_REPAIR_OUTCOME: ${{ steps.verify_after_repair.outcome }}

      - name: Dispatch next full-loop repair cycle
        if: ${{ always() && steps.repair_loop.outputs.should_rerun == 'true' }}
        run: |
          gh workflow run daily-verification-loop.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ github.ref_name }}" \
            -f attempts="${{ inputs.attempts || '10' }}" \
            -f stream_minutes="${{ inputs.stream_minutes || '10' }}" \
            -f repair_cycle="${{ steps.repair_loop.outputs.next_cycle }}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Report unresolved daily verification failure
        if: ${{ always() && steps.repair_loop.outputs.should_report == 'true' }}
        run: |
          {
            echo "ConferenceHype daily verification loop found unresolved failures after all repair cycles."
            echo ""
            echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo "Repair cycle: ${{ steps.repair_loop.outputs.current_cycle }}"
            echo "Maximum repair cycles: ${{ env.DAILY_VERIFICATION_MAX_REPAIR_CYCLES }}"
            echo "Typecheck: ${{ steps.typecheck.outcome }}"
            echo "Broadcast guards: ${{ steps.guards.outcome }}"
            echo "Build: ${{ steps.build.outcome }}"
            echo "RSS verification: ${{ steps.rss.outcome }}"
            echo "RSS repair ingest: ${{ steps.rss_repair_ingest.outcome }}"
            echo "RSS verification after repair: ${{ steps.rss_after_repair.outcome }}"
            echo "Weekly source card generation: ${{ steps.weekly_cards.outcome }}"
            echo "Weekly source card verification: ${{ steps.weekly_cards_verify.outcome }}"
            echo "Weekly source card repair: ${{ steps.weekly_cards_repair.outcome }}"
            echo "Weekly source card verification after repair: ${{ steps.weekly_cards_after_repair.outcome }}"
            echo "Platform smoke: ${{ steps.smoke.outcome }}"
            echo "Platform smoke after repair: ${{ steps.smoke_after_repair.outcome }}"
            echo "Stream handoff: ${{ steps.stream.outcome }}"
            echo "Handoff repair smoke: ${{ steps.handoff_repair_smoke.outcome }}"
            echo "Stream handoff after repair: ${{ steps.stream_after_repair.outcome }}"
            echo "Selected delivery handoff: ${{ steps.delivery_handoff.outputs.source }}"
            echo "Stream unsupported: ${{ steps.delivery_handoff.outputs.unsupported_state }}"
            echo "Stream unsupported reason: ${{ steps.delivery_handoff.outputs.unsupported_reason }}"
            echo "Video: ${{ steps.delivery_handoff.outputs.video_url }}"
            echo "Video ID: ${{ steps.delivery_handoff.outputs.video_id }}"
            echo "YouTube status: ${{ steps.delivery_handoff.outputs.youtube_status }}"
            echo "Initial delivery verifier: ${{ steps.verify_initial.outcome }}"
            echo "Delivery verifier after repair: ${{ steps.verify_after_repair.outcome }}"
            echo ""
            for file in typecheck.log broadcast-guards.log build.log rss-verification.log rss-repair-ingest.log rss-verification-after-repair.log weekly-source-cards.log weekly-source-cards-verify.log weekly-source-cards-repair.log weekly-source-cards-after-repair.log platform-smoke-loop.log platform-smoke-loop-after-repair.log stream-status.json handoff-repair-smoke.log stream-status-after-repair.json verify-initial.log repair-visibility.log verify-after-repair.log; do
              if [ -f "$file" ]; then
                echo "## $file"
                echo '```text'
                cat "$file"
                echo '```'
                echo ""
              fi
            done
          } > issue-body.md
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Daily verification loop failed after repair cycles" \
            --body-file issue-body.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Fail unresolved daily verification loop
        if: ${{ always() && steps.repair_loop.outputs.unresolved == 'true' }}
        run: exit 1
