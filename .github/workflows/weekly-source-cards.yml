name: Weekly source cards

on:
  workflow_dispatch:
    inputs:
      cards_per_source:
        description: "Cards to pre-generate per enabled conference and news source"
        required: true
        default: "8"
      scope:
        description: "Which entity types to generate cards for"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - journals
          - conferences
          - newspapers
  schedule:
    - cron: "20 9 * * 0"

permissions:
  contents: read

jobs:
  weekly-non-journal-cards:
    if: ${{ github.event_name == 'schedule' || inputs.scope != 'journals' }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Generate conference ready-card pool
        id: generate_conference_cards
        continue-on-error: true
        if: ${{ github.event_name == 'schedule' || inputs.scope == 'all' || inputs.scope == 'conferences' }}
        run: npm run job:weekly-source-cards
        env:
          WEEKLY_SOURCE_CARDS_PER_SOURCE: ${{ inputs.cards_per_source || '8' }}
          WEEKLY_SOURCE_SCOPE: conferences
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      - name: Verify conference ready-card pool
        id: verify_conference_cards
        continue-on-error: true
        if: ${{ github.event_name == 'schedule' || inputs.scope == 'all' || inputs.scope == 'conferences' }}
        run: npm run test:weekly-source-cards
        env:
          WEEKLY_SOURCE_SCOPE: conferences
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Repair conference ready-card pool
        if: ${{ steps.generate_conference_cards.outcome == 'failure' || steps.verify_conference_cards.outcome == 'failure' }}
        run: npm run job:weekly-source-cards
        env:
          WEEKLY_SOURCE_CARDS_PER_SOURCE: ${{ inputs.cards_per_source || '8' }}
          WEEKLY_SOURCE_SCOPE: conferences
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      - name: Verify conference ready-card pool after repair
        if: ${{ steps.generate_conference_cards.outcome == 'failure' || steps.verify_conference_cards.outcome == 'failure' }}
        run: npm run test:weekly-source-cards
        env:
          WEEKLY_SOURCE_SCOPE: conferences
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Generate news ready-card pool
        id: generate_news_cards
        continue-on-error: true
        if: ${{ github.event_name == 'schedule' || inputs.scope == 'all' || inputs.scope == 'newspapers' }}
        run: npm run job:weekly-source-cards
        env:
          WEEKLY_SOURCE_CARDS_PER_SOURCE: ${{ inputs.cards_per_source || '8' }}
          WEEKLY_SOURCE_SCOPE: newspapers
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      - name: Verify news ready-card pool
        id: verify_news_cards
        continue-on-error: true
        if: ${{ github.event_name == 'schedule' || inputs.scope == 'all' || inputs.scope == 'newspapers' }}
        run: npm run test:weekly-source-cards
        env:
          WEEKLY_SOURCE_SCOPE: newspapers
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      - name: Repair news ready-card pool
        if: ${{ steps.generate_news_cards.outcome == 'failure' || steps.verify_news_cards.outcome == 'failure' }}
        run: npm run job:weekly-source-cards
        env:
          WEEKLY_SOURCE_CARDS_PER_SOURCE: ${{ inputs.cards_per_source || '8' }}
          WEEKLY_SOURCE_SCOPE: newspapers
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
      - name: Verify news ready-card pool after repair
        if: ${{ steps.generate_news_cards.outcome == 'failure' || steps.verify_news_cards.outcome == 'failure' }}
        run: npm run test:weekly-source-cards
        env:
          WEEKLY_SOURCE_SCOPE: newspapers
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  weekly-journal-cards:
    if: ${{ github.event_name == 'schedule' || inputs.scope == 'all' || inputs.scope == 'journals' }}
    concurrency:
      group: journal-card-v2-production
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:journal-card-v2
      - name: Inventory PubMed, reconcile RSS, and create complete pending-review cards
        run: npm run job:journal-card-v2
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOURNAL_CARD_V2_SHADOW: "true"
          JOURNAL_CARD_V2_CREATE_PENDING: "true"
          JOURNAL_CARD_V2_LOOKBACK_DAYS: "14"
      - name: Finalize interrupted journal state
        if: ${{ always() }}
        run: npm run job:journal-card-v2:finalize
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          JOURNAL_CARD_V2_FINALIZE_REASON: "Journal card workflow ended before journal completion"
