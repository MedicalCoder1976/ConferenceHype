name: Station breaking-news broadcast

on:
  workflow_dispatch:
    inputs:
      station_breakin_id:
        description: "station_breakins UUID"
        required: true
      breaking_segment_id:
        description: "Approved breaking-news segment UUID"
        required: true
      stream_start_time:
        description: "Top (:00) or bottom (:30) of the next programming hour"
        required: true

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install kokoro numpy soundfile
      - name: Render and upload verified 15-minute break-in
        run: npx tsx scripts/render-hour-broadcast.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          HOUR_BROADCAST_MODE: breaking15
          HOUR_BROADCAST_SECONDS: "900"
          HOUR_BROADCAST_START: ${{ inputs.stream_start_time }}
          BREAKING_SEGMENT_ID: ${{ inputs.breaking_segment_id }}
          STATION_BREAKIN_ID: ${{ inputs.station_breakin_id }}
          BROADCAST_TITLE: "ConferenceHype Breaking Medical Research Update"
          PUBLIC_SITE_URL: https://conferencehype.com
          FFMPEG_PATH: /usr/bin/ffmpeg
          HOUR_BROADCAST_OUTPUT: public/rendered/conferencehype-breaking-news.mp4
          KOKORO_PYTHON_CMD: python3
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
          VOICE_AETHER_VALE: ${{ secrets.VOICE_AETHER_VALE }}
          VOICE_AMARA_SOL: ${{ secrets.VOICE_AMARA_SOL }}
          VOICE_BENJI_CROSS: ${{ secrets.VOICE_BENJI_CROSS }}
          VOICE_DIEGO_VALE: ${{ secrets.VOICE_DIEGO_VALE }}
          VOICE_ECHO_SAGE: ${{ secrets.VOICE_ECHO_SAGE }}
          VOICE_ELENA_PARK: ${{ secrets.VOICE_ELENA_PARK }}
          VOICE_GRANT_IVEY: ${{ secrets.VOICE_GRANT_IVEY }}
          VOICE_KAI_LENNOX: ${{ secrets.VOICE_KAI_LENNOX }}
          VOICE_LUNA_VALE: ${{ secrets.VOICE_LUNA_VALE }}
          VOICE_MILES_CARTER: ${{ secrets.VOICE_MILES_CARTER }}
          VOICE_NOVA_QUINN: ${{ secrets.VOICE_NOVA_QUINN }}
          VOICE_ORION_REED: ${{ secrets.VOICE_ORION_REED }}
          VOICE_RILEY_KNOX: ${{ secrets.VOICE_RILEY_KNOX }}
          VOICE_SAGE_HARLAN: ${{ secrets.VOICE_SAGE_HARLAN }}
          VOICE_SOFIA_REYES: ${{ secrets.VOICE_SOFIA_REYES }}
          VOICE_TALIA_STONE: ${{ secrets.VOICE_TALIA_STONE }}
          VOICE_VESPER_QUILL: ${{ secrets.VOICE_VESPER_QUILL }}
      - name: Record isolated break-in failure
        if: ${{ failure() }}
        run: npx tsx scripts/update-station-failure.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          STATION_BREAKIN_ID: ${{ inputs.station_breakin_id }}
          STATION_FAILURE_REASON: The 15-minute break-in workflow failed before YouTube verification; the existing public player was retained.
