name: Upload Devpost demo

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Download temporary demo asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download devpost-demo-upload-v2-20260720 --pattern conferencehype-build-week-demo-v2.mp4
      - name: Upload public video
        env:
          YOUTUBE_OAUTH_CLIENT_ID: ${{ secrets.YOUTUBE_OAUTH_CLIENT_ID }}
          YOUTUBE_OAUTH_CLIENT_SECRET: ${{ secrets.YOUTUBE_OAUTH_CLIENT_SECRET }}
          YOUTUBE_OAUTH_REFRESH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_REFRESH_TOKEN }}
        run: npx tsx scripts/upload-devpost-demo.ts conferencehype-build-week-demo-v2.mp4
